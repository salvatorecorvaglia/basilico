<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFE7D8"/>
      <stop offset="100%" stop-color="#E3D9C4"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg2)"/>

  <!-- git graph shaped like a basil branch, monoline style -->
  <g fill="none" stroke="#2F5233" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- main stem -->
    <path d="M256 400 L256 130"/>
    <!-- branch left lower -->
    <path d="M256 340 C 220 340, 190 320, 172 280"/>
    <!-- branch right lower -->
    <path d="M256 340 C 292 340, 322 320, 340 280"/>
    <!-- branch left upper -->
    <path d="M256 220 C 224 220, 198 202, 182 168"/>
    <!-- branch right upper -->
    <path d="M256 220 C 288 220, 314 202, 330 168"/>
  </g>

  <!-- leaves as filled shapes at branch tips -->
  <g fill="#3F7D3A">
    <ellipse cx="164" cy="266" rx="30" ry="18" transform="rotate(-35 164 266)"/>
    <ellipse cx="348" cy="266" rx="30" ry="18" transform="rotate(35 348 266)"/>
    <ellipse cx="174" cy="154" rx="26" ry="16" transform="rotate(-35 174 154)"/>
    <ellipse cx="338" cy="154" rx="26" ry="16" transform="rotate(35 338 154)"/>
    <ellipse cx="256" cy="112" rx="24" ry="34"/>
  </g>

  <!-- commit nodes -->
  <g fill="#EFE7D8" stroke="#2F5233" stroke-width="8">
    <circle cx="256" cy="400" r="14"/>
    <circle cx="256" cy="340" r="12"/>
    <circle cx="256" cy="220" r="12"/>
  </g>

</svg>
