name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=6144"

jobs:
  # ──────────────────────────────────────────────
  # Validate Tag Ref
  # ──────────────────────────────────────────────
  validate:
    name: Validate Tag Ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate tag format and version match
        run: |
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Release workflow must be run on a version tag ref starting with 'v' (e.g. refs/tags/v1.0.0)"
            exit 1
          fi
          
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          
          # Read package.json version
          PKG_VERSION=$(jq -r .version package.json)
          
          # Read tauri.conf.json version
          TAURI_VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          
          # Read Cargo.toml version
          CARGO_VERSION=$(grep -m 1 '^version = ' src-tauri/Cargo.toml | cut -d '"' -f 2)
          
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          echo "tauri.conf.json version: $TAURI_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          
          if [[ "$TAG_VERSION" != "$TAURI_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match tauri.conf.json version ($TAURI_VERSION)"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match src-tauri/Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Quality Gates – run in parallel before building artifacts
  # ──────────────────────────────────────────────
  quality-frontend:
    name: Quality Gate (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting (Biome)
        run: pnpm run lint

      - name: Run frontend tests
        run: pnpm run test

      - name: Typecheck & Build
        run: pnpm run build

  quality-rust-fmt:
    name: Quality Gate (Rust Format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

  quality-rust-clippy-test:
    name: Quality Gate (Rust Clippy & Test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Clippy linting
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ──────────────────────────────────────────────
  # Build & Publish – Tauri Platforms Matrix
  # ──────────────────────────────────────────────
  publish-tauri:
    name: Release (${{ matrix.platform }})
    permissions:
      contents: write
    needs: [quality-frontend, quality-rust-fmt, quality-rust-clippy-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-15'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-15'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: ''
            args: ''
          - platform: 'windows-latest'
            target: ''
            args: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable updater if signing key is missing
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY == '' }}
        shell: bash
        run: |
          echo "TAURI_SIGNING_PRIVATE_KEY is not set. Disabling updater."
          jq '.bundle.createUpdaterArtifacts = false | .plugins.updater.active = false' src-tauri/tauri.conf.json > temp.json && mv temp.json src-tauri/tauri.conf.json

      - name: Build and Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: 'Basilico v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ──────────────────────────────────────────────
  # Finalize – update release description and publish
  # ──────────────────────────────────────────────
  finalize:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs: publish-tauri
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract Release Notes
        id: extract_notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -e "1,/## \[$VERSION\]/d" -e '/## \[/,$d' CHANGELOG.md 2>/dev/null || true)
          fi
          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="Basilico release $TAG"
          fi
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.extract_notes.outputs.notes }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          gh release edit "$TAG" \
            --draft=false \
            --title "Basilico v$VERSION" \
            --notes "$RELEASE_NOTES" \
            --repo "$GITHUB_REPOSITORY"
