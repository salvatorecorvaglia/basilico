name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  NODE_OPTIONS: "--max-old-space-size=6144"

jobs:
  # ──────────────────────────────────────────────
  # Frontend Lint & Build Check
  # ──────────────────────────────────────────────
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate version consistency
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAURI_VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          CARGO_VERSION=$(grep -m 1 '^version = ' src-tauri/Cargo.toml | cut -d '"' -f 2)
          if [ "$PKG_VERSION" != "$TAURI_VERSION" ] || [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: package.json is $PKG_VERSION, src-tauri/tauri.conf.json is $TAURI_VERSION, Cargo.toml is $CARGO_VERSION"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting (Biome)
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Typecheck & Build
        run: pnpm run build

  # ──────────────────────────────────────────────
  # Rust Format Check
  # ──────────────────────────────────────────────
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

  # ──────────────────────────────────────────────
  # Rust Clippy & Unit Tests
  # ──────────────────────────────────────────────
  rust-clippy-test:
    name: Rust Clippy & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Clippy linting
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ──────────────────────────────────────────────
  # Auto Tagging (only on main after success)
  # ──────────────────────────────────────────────
  tag:
    name: Create Version Tag
    needs: [frontend-check, rust-fmt, rust-clippy-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: pkg_version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION="v${{ steps.pkg_version.outputs.version }}"
          if [ -n "$(git ls-remote --tags origin refs/tags/$VERSION)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $VERSION already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $VERSION does not exist. Proceeding to create."
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="v${{ steps.pkg_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
