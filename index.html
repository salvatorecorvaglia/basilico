<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basilico</title>
    <script>
      (function() {
        const theme = localStorage.getItem('basilico-theme') || 'sage-green';
        const presets = {
          'sage-green': '#2ea043',
          'royal-blue': '#1f6feb',
          'amethyst-purple': '#8b5cf6',
          'amber-gold': '#d29922',
          'crimson-red': '#f85149',
          'ocean-teal': '#2dd4bf'
        };
        const color = presets[theme] || '#2ea043';
        document.documentElement.style.setProperty('--accent-primary', color);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
